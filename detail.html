<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details | Releasemap</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo">Releasemap</a>
            <div class="nav-links">
                <a href="index.html?type=movie">Movies</a>
                <a href="index.html?type=tv">TV Shows</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search movies & series...">
            </div>
            <button class="watchlist-nav-btn" id="watchlistBtn" title="My Watchlist">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                Watchlist
                <span class="watchlist-count" id="watchlistCount" style="display:none;">0</span>
            </button>
        </div>
    </nav>



    <div id="detailContent">
        <!-- Content added by detail.js -->
    </div>

    <!-- Trailer Modal -->
    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="trailerVideoContainer"></div>
        </div>
    </div>

    <footer class="site-footer">
        <p>Design by Buckazoid &nbsp;·&nbsp; Helped by <a href="https://claude.ai" target="_blank" rel="noopener">claude.ai</a></p>
    </footer>

    <script type="module" src="js/detail.js"></script>

    <button id="backToTop" class="back-to-top" title="Back to top" aria-label="Back to top">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <script>
        (function() {
            const btn = document.getElementById('backToTop');
            if (!btn) return;
            window.addEventListener('scroll', () => {
                btn.classList.toggle('visible', window.scrollY > 400);
            }, { passive: true });
            btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        })();
    </script>
</body>


</html>
