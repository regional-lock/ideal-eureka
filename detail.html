    <title>Details | MovieVerse</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo" id="logoLink">MovieVerse</a>
            <div class="nav-links">
                <a href="index.html?type=movie">Movies</a>
                <a href="index.html?type=tv">TV Shows</a>
