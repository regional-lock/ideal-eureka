<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Releasemap | Movie Database</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo">Releasemap</a>
            <div class="nav-links">
                <a href="index.html?type=movie">Movies</a>
                <a href="index.html?type=tv">TV Shows</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search movies & series...">
            </div>
            <button class="watchlist-nav-btn" id="watchlistBtn" title="My Watchlist">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                Watchlist
                <span class="watchlist-count" id="watchlistCount" style="display:none;">0</span>
            </button>
        </div>
    </nav>

    <header class="hero" id="hero">
        <div class="hero-content" id="heroContent"></div>
    </header>

    <div class="hero-search-bar">
        <div class="hero-search-inner">
            <span class="hero-search-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" id="heroSearchInput" placeholder="Search for a movie or TV show…" autocomplete="off">
            <button id="heroSearchBtn">Search</button>
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <label>Type</label>
            <select id="typeFilter">
                <option value="movie">Movies</option>
                <option value="tv">TV Shows</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Genre</label>
            <select id="genreFilter"><option value="">All Genres</option></select>
        </div>
        <div class="filter-group">
            <label>Language</label>
            <select id="languageFilter"><option value="">All Languages</option></select>
        </div>
        <div class="filter-group">
            <label>Country</label>
            <select id="countryFilter"><option value="">All Regions</option></select>
        </div>
        <div class="filter-group">
            <label>Min Rating</label>
            <select id="ratingFilter">
                <option value="">Any Rating</option>
                <option value="9">9+ ★</option>
                <option value="8">8+ ★</option>
                <option value="7">7+ ★</option>
                <option value="6">6+ ★</option>
                <option value="5">5+ ★</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Year From</label>
            <select id="yearFromFilter"><option value="">Any</option></select>
        </div>
        <div class="filter-group">
            <label>Year To</label>
            <select id="yearToFilter"><option value="">Any</option></select>
        </div>
    </div>

    <main id="mainContent">
        <section id="discoverySection" style="display:none;">
            <h2 class="section-title" id="discoveryTitle">Discovery Results</h2>
            <div class="movie-grid" id="discoveryGrid"></div>
        </section>

        <section id="watchlistSection" style="display:none;">
            <h2 class="section-title">My Watchlist</h2>
            <div class="movie-grid" id="watchlistGrid"></div>
        </section>

        <section class="trending-section" style="position:relative;">
            <h2 class="section-title">Trending Now</h2>
            <button id="prevBtn" class="slider-control prev" onclick="moveSlider('prev')">‹</button>
            <div class="slider-viewport">
                <div class="slider-track" id="trendingGrid"></div>
            </div>
            <button id="nextBtn" class="slider-control next" onclick="moveSlider('next')">›</button>
        </section>

        <section id="nowPlayingSection">
            <h2 class="section-title">🎬 Now Playing</h2>
            <div class="movie-grid" id="nowPlayingGrid"></div>
        </section>

        <section id="upcomingSection">
            <h2 class="section-title">🗓 Coming Soon</h2>
            <div class="movie-grid" id="upcomingGrid"></div>
        </section>

        <section id="popularSection">
            <h2 class="section-title">Popular Movies</h2>
            <div class="movie-grid" id="popularGrid"></div>
        </section>

        <section id="topRatedSection">
            <h2 class="section-title">Top Rated Series</h2>
            <div class="movie-grid" id="topRatedGrid"></div>
        </section>
    </main>

    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="trailerVideoContainer"></div>
        </div>
    </div>

    <footer class="site-footer">
        <p>Design by Buckazoid &nbsp;·&nbsp; Helped by <a href="https://claude.ai" target="_blank" rel="noopener">claude.ai</a></p>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
